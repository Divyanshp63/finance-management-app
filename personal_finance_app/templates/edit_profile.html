{% extends "base.html" %}

{% block content %}
<style>
    /* Premium Edit Profile Styles */
    .profile-container {
        max-width: 600px;
        margin: 0 auto;
        animation: fadeIn 0.5s ease-in-out;
    }

    .profile-card {
        background: white;
        border-radius: 12px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        overflow: hidden;
        border: 1px solid rgba(102, 126, 234, 0.1);
        position: relative;
    }

    .profile-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 5px;
        background: linear-gradient(90deg, #667eea, #764ba2);
    }

    .profile-header {
        background: #f8f9ff;
        padding: 25px 30px;
        border-bottom: 1px solid rgba(102, 126, 234, 0.1);
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .profile-header h2 {
        color: #2d3561;
        font-size: 24px;
        font-weight: 700;
        margin: 0;
    }

    .profile-header-icon {
        font-size: 28px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .profile-body {
        padding: 30px;
    }

    .form-group {
        margin-bottom: 22px;
    }

    .form-label {
        display: block;
        font-weight: 600;
        color: #4a5568;
        margin-bottom: 8px;
        font-size: 14px;
        letter-spacing: 0.3px;
    }

    .form-control {
        width: 100%;
        padding: 12px 16px;
        border-radius: 8px;
        border: 2px solid #e2e8f0;
        background-color: #f8fafc;
        color: #2d3748;
        font-size: 15px;
        transition: all 0.3s ease;
        font-family: inherit;
        box-sizing: border-box;
    }

    .form-control:focus {
        outline: none;
        border-color: #667eea;
        background-color: #fff;
        box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    .form-control::placeholder {
        color: #cbd5e0;
    }

    .form-actions {
        display: flex;
        gap: 15px;
        margin-top: 30px;
        padding-top: 20px;
        border-top: 1px solid #edf2f7;
    }

    .alert {
        padding: 12px 16px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 14px;
        font-weight: 500;
        border-left: 4px solid transparent;
    }

    .alert-success {
        background-color: #f0fdf4;
        color: #166534;
        border-left-color: #22c55e;
    }

    .alert-danger,
    .alert-error {
        background-color: #fef2f2;
        color: #991b1b;
        border-left-color: #ef4444;
    }

    .alert-info {
        background-color: #eff6ff;
        color: #1e40af;
        border-left-color: #3b82f6;
    }

    .btn-submit {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        flex: 1;
        font-family: inherit;
    }

    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
    }

    .btn-cancel {
        background: white;
        color: #4a5568;
        border: 2px solid #e2e8f0;
        padding: 12px 24px;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        text-align: center;
        flex: 1;
        font-family: inherit;
        box-sizing: border-box;
    }

    .btn-cancel:hover {
        background: #f8fafc;
        border-color: #cbd5e0;
        color: #2d3748;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(15px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<div class="profile-container">
    <div class="profile-card">
        <div class="profile-header">
            <div class="profile-header-icon">✏️</div>
            <h2>Edit Profile</h2>
        </div>
        <div class="profile-body">
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" value="{{ user.username }}"
                        required placeholder="Enter your username">
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email" value="{{ user.email }}" required
                        placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label for="full_name" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="full_name" name="full_name"
                        value="{{ user.full_name or '' }}" placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label for="phone" class="form-label">Phone Number</label>
                    <input type="tel" class="form-control" id="phone" name="phone" value="{{ user.phone or '' }}"
                        placeholder="Enter your phone number">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit">Save Changes</button>
                    <a href="{{ url_for('auth.profile') }}" class="btn-cancel">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
